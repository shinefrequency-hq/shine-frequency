<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#2a0a1a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#g2)"/>
  <!-- Shattered/deconstructed shapes -->
  <g opacity="0.7">
    <polygon points="250,80 320,180 280,190" fill="none" stroke="#f48fb1" stroke-width="1.5"/>
    <polygon points="180,120 250,80 220,200" fill="none" stroke="#f48fb1" stroke-width="1"/>
    <polygon points="320,180 380,250 300,260" fill="none" stroke="#ff7043" stroke-width="1.5"/>
    <polygon points="120,200 180,120 160,280" fill="none" stroke="#f48fb1" stroke-width="1"/>
    <polygon points="280,190 300,260 230,270" fill="none" stroke="#ff7043" stroke-width="1"/>
    <polygon points="380,250 400,340 330,310" fill="none" stroke="#f08080" stroke-width="1"/>
    <polygon points="160,280 230,270 200,350" fill="none" stroke="#ff7043" stroke-width="1.5"/>
    <polygon points="300,260 330,310 260,330" fill="none" stroke="#f08080" stroke-width="1"/>
    <polygon points="100,300 160,280 140,360" fill="none" stroke="#f48fb1" stroke-width="0.5"/>
    <polygon points="260,330 300,370 240,380" fill="none" stroke="#f08080" stroke-width="1.5"/>
  </g>
  <!-- Noise lines -->
  <g stroke="#f48fb1" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="150" x2="500" y2="155"/>
    <line x1="0" y1="250" x2="500" y2="245"/>
    <line x1="0" y1="350" x2="500" y2="352"/>
  </g>
  <!-- Glitch rectangles -->
  <rect x="60" y="230" width="80" height="3" fill="#f48fb1" opacity="0.4"/>
  <rect x="360" y="170" width="60" height="2" fill="#ff7043" opacity="0.3"/>
  <rect x="200" y="310" width="100" height="2" fill="#f08080" opacity="0.3"/>
  <!-- Text -->
  <text x="250" y="400" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="11" letter-spacing="4" opacity="0.5">SF-042</text>
  <text x="250" y="425" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold" letter-spacing="2">PAULA TEMPLE</text>
  <text x="250" y="455" text-anchor="middle" fill="#f48fb1" font-family="Arial, sans-serif" font-size="13" letter-spacing="3">DECONSTRUCTED</text>
  <text x="250" y="485" text-anchor="middle" fill="#333" font-family="monospace" font-size="8" letter-spacing="2">SHINE FREQUENCY</text>
</svg>
