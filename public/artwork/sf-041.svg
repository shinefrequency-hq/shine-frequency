<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <filter id="noise1">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#g1)"/>
  <!-- Industrial grid lines -->
  <g stroke="#1D9E75" stroke-width="0.5" opacity="0.3">
    <line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
  </g>
  <!-- Pressure gauge circles -->
  <circle cx="250" cy="220" r="120" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.6"/>
  <circle cx="250" cy="220" r="80" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
  <circle cx="250" cy="220" r="40" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="220" r="5" fill="#1D9E75" opacity="0.8"/>
  <!-- Pressure needle -->
  <line x1="250" y1="220" x2="340" y2="160" stroke="#f08080" stroke-width="2" opacity="0.8"/>
  <!-- Tick marks -->
  <g stroke="#1D9E75" stroke-width="1.5" opacity="0.5">
    <line x1="250" y1="98" x2="250" y2="110"/>
    <line x1="370" y1="220" x2="358" y2="220"/>
    <line x1="130" y1="220" x2="142" y2="220"/>
    <line x1="335" y1="134" x2="326" y2="143"/>
    <line x1="165" y1="134" x2="174" y2="143"/>
  </g>
  <!-- Text -->
  <text x="250" y="400" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="11" letter-spacing="4" opacity="0.5">SF-041</text>
  <text x="250" y="425" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="2">SURGEON</text>
  <text x="250" y="455" text-anchor="middle" fill="#1D9E75" font-family="Arial, sans-serif" font-size="13" letter-spacing="3">PRESSURE SYSTEMS</text>
  <!-- Shine Frequency mark -->
  <text x="250" y="485" text-anchor="middle" fill="#333" font-family="monospace" font-size="8" letter-spacing="2">SHINE FREQUENCY</text>
</svg>
