<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0a1a2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="aurora" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7ab8f5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="500" fill="url(#g3)"/>
  <rect width="500" height="500" fill="url(#aurora)"/>
  <!-- Mountain silhouette -->
  <polygon points="0,350 80,220 140,280 200,180 260,250 330,150 400,230 450,190 500,260 500,500 0,500" fill="#0a0f14"/>
  <polygon points="0,370 60,280 120,320 180,240 240,300 300,200 360,270 420,220 500,300 500,500 0,500" fill="#060a0f"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="80" cy="60" r="1"/><circle cx="150" cy="40" r="1.5"/><circle cx="300" cy="80" r="1"/>
    <circle cx="400" cy="50" r="1.2"/><circle cx="450" cy="100" r="1"/><circle cx="50" cy="120" r="0.8"/>
    <circle cx="200" cy="90" r="1.3"/><circle cx="350" cy="30" r="0.8"/><circle cx="480" cy="70" r="1"/>
    <circle cx="120" cy="150" r="0.7"/><circle cx="380" cy="130" r="1.1"/><circle cx="250" cy="50" r="0.9"/>
  </g>
  <!-- Aurora bands -->
  <g opacity="0.25">
    <path d="M0,140 Q125,100 250,130 Q375,160 500,120" fill="none" stroke="#7ab8f5" stroke-width="2"/>
    <path d="M0,155 Q125,120 250,145 Q375,175 500,135" fill="none" stroke="#4ecca3" stroke-width="1.5"/>
    <path d="M0,170 Q125,140 250,160 Q375,185 500,150" fill="none" stroke="#b8b4f0" stroke-width="1"/>
  </g>
  <!-- Compass point -->
  <g transform="translate(250, 110)" opacity="0.5">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#7ab8f5" stroke-width="1"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#7ab8f5" stroke-width="1"/>
    <polygon points="0,-18 -4,-8 4,-8" fill="#f08080" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="250" y="405" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="11" letter-spacing="4" opacity="0.5">SF-043</text>
  <text x="250" y="430" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="2">REBEKAH</text>
  <text x="250" y="460" text-anchor="middle" fill="#7ab8f5" font-family="Arial, sans-serif" font-size="13" letter-spacing="3">MAGNETIC NORTH</text>
  <text x="250" y="488" text-anchor="middle" fill="#333" font-family="monospace" font-size="8" letter-spacing="2">SHINE FREQUENCY</text>
</svg>
